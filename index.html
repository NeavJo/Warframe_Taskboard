<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Warframe Taskboard</title>

  <!-- Material Icons (Google Fonts) -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- 样式（按加载顺序：主题 → Orokin → 动画 → 布局 → 组件 → 页面 → 响应式） -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/orokin.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <!-- 页面样式（按需新增页面文件即可） -->
  <link rel="stylesheet" href="css/pages/taskboard.css">
  <link rel="stylesheet" href="css/pages/browser.css">
  <link rel="stylesheet" href="css/pages/settings.css">
  <link rel="stylesheet" href="css/pages/reminder.css">
  <link rel="stylesheet" href="css/pages/arbitration.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- 预加载字体（可选） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <!-- 全局 SVG 渐变资源库（Orokin 风格） -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <!-- 精密金渐变（静态金边） -->
      <linearGradient id="gold-bright-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8a6d1b" />
        <stop offset="30%" stop-color="#ffe680" />
        <stop offset="50%" stop-color="#ffffff" />
        <stop offset="70%" stop-color="#ffe680" />
        <stop offset="100%" stop-color="#8a6d1b" />
      </linearGradient>

      <!-- 精密蓝渐变（静态蓝边 - 周常用） -->
      <linearGradient id="blue-bright-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a5a8a" />
        <stop offset="30%" stop-color="#80d4ff" />
        <stop offset="50%" stop-color="#ffffff" />
        <stop offset="70%" stop-color="#80d4ff" />
        <stop offset="100%" stop-color="#0a5a8a" />
      </linearGradient>

      <!-- 暗金流光渐变（沿路径流动） -->
      <linearGradient id="gold-flow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(158, 107, 8, 0)" />
        <stop offset="40%" stop-color="rgba(255, 214, 102, 0.95)" />
        <stop offset="60%" stop-color="rgba(212, 175, 55, 0.98)" />
        <stop offset="100%" stop-color="rgba(158, 107, 8, 0)" />
      </linearGradient>

      <!-- 暗蓝流光渐变（沿路径流动 - 周常用） -->
      <linearGradient id="blue-flow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(10, 90, 138, 0)" />
        <stop offset="40%" stop-color="rgba(128, 212, 255, 0.95)" />
        <stop offset="60%" stop-color="rgba(31, 182, 255, 0.98)" />
        <stop offset="100%" stop-color="rgba(10, 90, 138, 0)" />
      </linearGradient>

      <!-- 银白金属光泽渐变（静态银边 - 未完成卡片用） -->
      <linearGradient id="silver-bright-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3a4048" />
        <stop offset="30%" stop-color="#b8c4d0" />
        <stop offset="50%" stop-color="#ffffff" />
        <stop offset="70%" stop-color="#b8c4d0" />
        <stop offset="100%" stop-color="#3a4048" />
      </linearGradient>

      <!-- 银白流光渐变（沿路径流动 - 未完成卡片用） -->
      <linearGradient id="silver-flow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(120, 130, 140, 0)" />
        <stop offset="40%" stop-color="rgba(200, 210, 220, 0.9)" />
        <stop offset="60%" stop-color="rgba(240, 245, 250, 0.95)" />
        <stop offset="100%" stop-color="rgba(120, 130, 140, 0)" />
      </linearGradient>

      <!-- 暗金流光渐变（沿路径流动 - 开关/控件用，NJOrokinUI 风格） -->
      <linearGradient id="shadow-flow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(138, 109, 27, 0)" />
        <stop offset="40%" stop-color="rgba(255, 230, 128, 0.9)" />
        <stop offset="60%" stop-color="rgba(212, 175, 55, 0.95)" />
        <stop offset="100%" stop-color="rgba(138, 109, 27, 0)" />
      </linearGradient>
    </defs>
  </svg>

  <div id="app">
    <!-- ============================================================
         宽屏全局顶栏 (≥900px)
         ============================================================ -->
    <header class="app-header" id="wide-header">
      <div class="brand">
        <div class="brand-badge">✦</div>
        <div class="brand-text">
          <h1>WARFRAME</h1>
          <div class="subtitle" id="header-subtitle">TASKBOARD / 看板</div>
        </div>
      </div>

      <!-- 中间区域（浏览器页显示控件） -->
      <div class="header-center" id="header-center"></div>

      <!-- 右侧：日期 + 倒计时 + 管理按钮 -->
      <div class="header-right" id="header-right">
        <div class="header-right-inner">
          <div class="header-right-top">
            <span class="header-date-text" id="wide-date-text"></span>
            <button class="wf-btn manage-btn" id="wide-manage-btn">管理</button>
          </div>
          <div class="header-countdown-text" id="wide-countdown-text"></div>
        </div>
      </div>
    </header>

    <div class="glow-divider"></div>

    <!-- ============================================================
         主内容区
         ============================================================ -->
    <div class="main-area">
      <!-- 宽屏侧栏 (≥900px) -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-nav" id="sidebar-nav"></div>
        <div class="sidebar-footer"></div>
      </nav>

      <!-- 内容面板  -->
      <main class="content-panel" id="content-panel">
        <!-- 看板页 -->
        <div class="page-view active" id="page-taskboard"></div>
        <!-- 提醒页 -->
        <div class="page-view" id="page-reminder"></div>
        <!-- 仲裁页 -->
        <div class="page-view" id="page-arbitration"></div>
        <!-- 浏览器页 -->
        <div class="page-view" id="page-browser"></div>
        <!-- 设置页 -->
        <div class="page-view" id="page-settings"></div>
      </main>
    </div>

    <!-- ============================================================
         窄屏底部导航栏 (<900px)
         ============================================================ -->
    <nav class="bottom-nav" id="bottom-nav">
      <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
    </nav>

    <!-- ============================================================
         浏览器宽屏控制区（默认隐藏，由 AppShell 顶栏动态渲染）
         ============================================================ -->
    <template id="browser-controls-template">
      <div class="browser-controls" id="br-wide-controls">
        <div class="site-tabs" id="br-wide-site-tabs"></div>
        <div class="url-bar">
          <span class="material-icons link-icon">link</span>
          <input type="text" id="br-url-input" placeholder="输入 URL…" />
        </div>
        <button class="wf-btn wf-icon-btn" id="br-reload-btn" title="刷新">
          <span class="material-icons">refresh</span>
        </button>
        <button class="wf-btn wf-icon-btn" id="br-home-btn" title="首页">
          <span class="material-icons">home</span>
        </button>
      </div>
    </template>
  </div>

  <!-- ============================================================
       JavaScript 模块加载（按依赖顺序）
       ============================================================ -->
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/components.js"></script>
  <script src="js/taskboard.js"></script>
  <script src="js/reminder.js"></script>
  <script src="js/arbitration_data.js"></script>
  <script src="js/arbitration.js"></script>
  <script src="js/browser.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
